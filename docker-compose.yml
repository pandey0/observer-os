services:
  observer:
    build: .
    ports:
      - "4000:4000"
      - "7891:7891"
    volumes:
      - observer_data:/data
    environment:
      NODE_ENV: production
      OBSERVER_PORT: 4000
      OBSERVER_HOST: 0.0.0.0
      OBSERVER_DATA_DIR: /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  observer_data:
