<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <!-- Observer inject — zero config, auto-connects -->
  <script src="http://localhost:4000/observer.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
    .topbar{background:#1e293b;border-bottom:1px solid #334155;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .topbar h1{font-size:14px;font-weight:600;color:#f1f5f9}
    .badge{background:#6366f1;color:#fff;font-size:11px;padding:2px 8px;border-radius:12px}
    select,input,button{font-family:inherit;font-size:13px}
    #login-screen{flex:1;display:flex;align-items:center;justify-content:center}
    .login-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:32px;width:360px}
    .login-card h2{font-size:18px;font-weight:600;margin-bottom:20px;color:#f1f5f9}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
    .field input{width:100%;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;outline:none}
    .field input:focus{border-color:#6366f1}
    .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
    .btn-primary{background:#6366f1;color:#fff;width:100%}
    .btn-primary:hover{background:#4f46e5}
    .btn-sm{padding:4px 10px;font-size:12px;background:#334155;color:#e2e8f0}
    .btn-sm:hover{background:#475569}
    .btn-danger{background:#dc2626;color:#fff}
    .hint{font-size:11px;color:#475569;margin-top:10px;text-align:center}
    #app{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none}
    .toolbar{padding:10px 20px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .project-tabs{display:flex;gap:4px}
    .proj-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:#94a3b8;border:none;background:transparent}
    .proj-tab.active{background:#334155;color:#f1f5f9}
    .board{flex:1;display:flex;gap:0;overflow-x:auto;overflow-y:hidden;padding:16px;gap:12px}
    .column{flex:0 0 260px;display:flex;flex-direction:column;background:#1e293b;border-radius:8px;border:1px solid #334155;overflow:hidden}
    .col-header{padding:10px 14px;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
    .col-count{background:#334155;color:#94a3b8;font-size:11px;padding:1px 7px;border-radius:10px}
    .col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
    .task-card{background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
    .task-card:hover{border-color:#6366f1}
    .task-title{font-size:13px;color:#e2e8f0;margin-bottom:6px;line-height:1.4}
    .task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .priority{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;text-transform:uppercase}
    .priority-urgent{background:#450a0a;color:#fca5a5}
    .priority-high{background:#431407;color:#fdba74}
    .priority-medium{background:#1c1917;color:#a8a29e}
    .priority-low{background:#0f2231;color:#7dd3fc}
    .avatar{width:20px;height:20px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0}
    .due{font-size:10px;color:#64748b}
    .due.overdue{color:#f87171}
    .add-task-btn{margin:6px 8px;padding:6px;border-radius:6px;border:1px dashed #334155;background:transparent;color:#475569;font-size:12px;cursor:pointer;text-align:center}
    .add-task-btn:hover{border-color:#6366f1;color:#a5b4fc}
    /* modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
    .modal{background:#1e293b;border:1px solid #334155;border-radius:12px;width:520px;max-height:80vh;overflow-y:auto;padding:24px}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-field{margin-bottom:12px}
    .modal-field label{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
    .modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;outline:none;font-size:13px}
    .modal-field textarea{resize:vertical;min-height:80px}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
    .comment{padding:8px 0;border-bottom:1px solid #1e293b}
    .comment-meta{font-size:11px;color:#475569;margin-bottom:4px}
    .comment-body{font-size:13px;color:#cbd5e1}
    #ws-indicator{margin-left:auto;font-size:11px;color:#475569;display:flex;align-items:center;gap:5px}
    .ws-dot{width:7px;height:7px;border-radius:50%;background:#ef4444}
    .ws-dot.on{background:#22c55e}
    .error-toast{position:fixed;bottom:20px;right:20px;background:#7f1d1d;border:1px solid #dc2626;color:#fca5a5;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;display:none}
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Task Manager</h1>
    <span class="badge" id="workspace-name">—</span>
    <div id="ws-indicator"><span class="ws-dot" id="ws-dot"></span><span id="ws-label">—</span></div>
  </div>

  <div id="login-screen">
    <div class="login-card">
      <h2>Sign in</h2>
      <div class="field"><label>Email</label><input id="email" type="email" value="alice@acme.com" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="password" type="password" value="password123" autocomplete="current-password"></div>
      <button class="btn btn-primary" onclick="login()">Sign in</button>
      <p class="hint">Try: alice@acme.com / bob@acme.com / carol@acme.com<br>Password: password123</p>
    </div>
  </div>

  <div id="app">
    <div class="toolbar">
      <div class="project-tabs" id="project-tabs"></div>
      <button class="btn btn-sm" onclick="showAddTask()">+ New task</button>
      <button class="btn btn-sm btn-danger" onclick="logout()" style="margin-left:auto">Sign out</button>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal"></div>
  </div>

  <div class="error-toast" id="error-toast"></div>

  <script>
    const API = 'http://localhost:3000/api';
    let token = localStorage.getItem('tm_token');
    let currentUser = JSON.parse(localStorage.getItem('tm_user') || 'null');
    let currentProject = null;
    let projects = [];
    let tasks = {};
    let ws = null;
    const STATUSES = ['todo','in_progress','in_review','done'];
    const STATUS_LABELS = { todo:'To Do', in_progress:'In Progress', in_review:'In Review', done:'Done' };

    function api(method, path, body) {
      return fetch(API + path, {
        method, headers: { 'content-type':'application/json', ...(token ? { 'authorization':'Bearer '+token } : {}) },
        body: body ? JSON.stringify(body) : undefined
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw Object.assign(new Error(d.error || 'Request failed'), { status: r.status });
        return d;
      });
    }

    function showError(msg) {
      const t = document.getElementById('error-toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 4000);
    }

    async function login() {
      try {
        const data = await api('POST', '/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        token = data.token; currentUser = data.user;
        localStorage.setItem('tm_token', token);
        localStorage.setItem('tm_user', JSON.stringify(currentUser));
        await loadApp();
      } catch(e) { showError(e.message); }
    }

    async function logout() {
      await api('DELETE', '/auth/logout').catch(() => {});
      token = null; currentUser = null;
      localStorage.removeItem('tm_token'); localStorage.removeItem('tm_user');
      document.getElementById('app').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      if (ws) { ws.close(); ws = null; }
    }

    async function loadApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      const wsList = await api('GET', '/workspaces');
      const workspace = wsList.workspaces[0];
      if (!workspace) { showError('No workspaces found'); return; }
      document.getElementById('workspace-name').textContent = workspace.name;
      const projList = await api('GET', `/workspaces/${workspace.slug}/projects`);
      projects = projList.projects;
      renderProjectTabs();
      if (projects.length) await selectProject(projects[0]);
      connectWs();
    }

    function renderProjectTabs() {
      const el = document.getElementById('project-tabs');
      el.innerHTML = projects.map(p =>
        `<button class="proj-tab${currentProject?.id===p.id?' active':''}" onclick="selectProject(${JSON.stringify(p).replace(/"/g,'&quot;')})">${p.name}</button>`
      ).join('');
    }

    async function selectProject(project) {
      currentProject = project;
      renderProjectTabs();
      const data = await api('GET', `/projects/${project.id}/tasks`);
      tasks = {};
      for (const t of data.tasks) tasks[t.id] = t;
      renderBoard(data.counts || {});
      if (ws?.readyState === 1) ws.send(JSON.stringify({ type:'subscribe', projectId: project.id }));
    }

    function renderBoard(counts) {
      const board = document.getElementById('board');
      board.innerHTML = STATUSES.map(status => {
        const cols_tasks = Object.values(tasks).filter(t => t.status === status);
        return `<div class="column" data-status="${status}">
          <div class="col-header">${STATUS_LABELS[status]}<span class="col-count">${cols_tasks.length}</span></div>
          <div class="col-body">
            ${cols_tasks.map(t => taskCardHtml(t)).join('')}
          </div>
          <button class="add-task-btn" onclick="showAddTask('${status}')">+ Add task</button>
        </div>`;
      }).join('');
    }

    function taskCardHtml(t) {
      const overdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done';
      return `<div class="task-card" onclick="showTask('${t.id}')">
        <div class="task-title">${escHtml(t.title)}</div>
        <div class="task-meta">
          <span class="priority priority-${t.priority}">${t.priority}</span>
          ${t.assignee_id ? `<span class="avatar" style="background:${t.assignee_color||'#6366f1'}">${(t.assignee_name||'?')[0]}</span>` : ''}
          ${t.due_date ? `<span class="due${overdue?' overdue':''}">${new Date(t.due_date).toLocaleDateString('en',{month:'short',day:'numeric'})}</span>` : ''}
        </div>
      </div>`;
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function showTask(id) {
      const t = tasks[id];
      if (!t) return;
      const comments = await api('GET', `/tasks/${id}/comments`).catch(() => ({ comments:[] }));
      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <h3>${escHtml(t.title)}</h3>
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <select onchange="updateTask('${id}',{status:this.value})">
            ${STATUSES.map(s=>`<option${t.status===s?' selected':''}>${s}</option>`).join('')}
          </select>
          <select onchange="updateTask('${id}',{priority:this.value})">
            ${['low','medium','high','urgent'].map(p=>`<option${t.priority===p?' selected':''}>${p}</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-danger" onclick="deleteTask('${id}')">Delete</button>
        </div>
        ${t.description ? `<p style="font-size:13px;color:#94a3b8;margin-bottom:16px">${escHtml(t.description)}</p>` : ''}
        <div style="font-size:12px;color:#475569;margin-bottom:16px">Comments (${comments.comments.length})</div>
        <div id="comment-list">
          ${comments.comments.map(c=>`<div class="comment">
            <div class="comment-meta">${escHtml(c.user_name)} · ${new Date(c.created_at).toLocaleString()}</div>
            <div class="comment-body">${escHtml(c.body)}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <input id="comment-input" style="flex:1;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:13px" placeholder="Add a comment...">
          <button class="btn btn-sm" onclick="addComment('${id}')">Send</button>
        </div>
      `;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').style.display = 'none';
    }

    function showAddTask(status) {
      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <h3>New task</h3>
        <div class="modal-field"><label>Title</label><input id="new-title" autofocus></div>
        <div class="modal-field"><label>Description (optional)</label><textarea id="new-desc" rows="3"></textarea></div>
        <div class="modal-field"><label>Status</label>
          <select id="new-status">${STATUSES.map(s=>`<option${s===(status||'todo')?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="modal-field"><label>Priority</label>
          <select id="new-priority"><option>low</option><option selected>medium</option><option>high</option><option>urgent</option></select>
        </div>
        <div class="modal-field"><label>Due date (optional)</label><input type="date" id="new-due"></div>
        <div class="modal-actions">
          <button class="btn btn-sm" onclick="document.getElementById('modal-overlay').style.display='none'">Cancel</button>
          <button class="btn btn-sm" style="background:#6366f1;color:#fff" onclick="createTask()">Create task</button>
        </div>
      `;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function createTask() {
      const title = document.getElementById('new-title').value.trim();
      if (!title) { showError('Title required'); return; }
      try {
        const task = await api('POST', `/projects/${currentProject.id}/tasks`, {
          title,
          description: document.getElementById('new-desc').value.trim() || undefined,
          status: document.getElementById('new-status').value,
          priority: document.getElementById('new-priority').value,
          due_date: document.getElementById('new-due').value || undefined,
        });
        tasks[task.id] = task;
        renderBoard({});
        document.getElementById('modal-overlay').style.display = 'none';
      } catch(e) { showError(e.message); }
    }

    async function updateTask(id, changes) {
      try {
        const updated = await api('PATCH', `/tasks/${id}`, changes);
        tasks[updated.id] = updated;
        renderBoard({});
      } catch(e) { showError(e.message); }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await api('DELETE', `/tasks/${id}`);
      delete tasks[id];
      renderBoard({});
      document.getElementById('modal-overlay').style.display = 'none';
    }

    async function addComment(taskId) {
      const input = document.getElementById('comment-input');
      const body = input.value.trim();
      if (!body) return;
      try {
        const c = await api('POST', `/tasks/${taskId}/comments`, { body });
        const list = document.getElementById('comment-list');
        list.insertAdjacentHTML('beforeend', `<div class="comment">
          <div class="comment-meta">${escHtml(c.user_name||currentUser.name)} · just now</div>
          <div class="comment-body">${escHtml(c.body)}</div>
        </div>`);
        input.value = '';
      } catch(e) { showError(e.message); }
    }

    function connectWs() {
      ws = new WebSocket('ws://localhost:3000');
      ws.onopen = () => {
        document.getElementById('ws-dot').classList.add('on');
        document.getElementById('ws-label').textContent = 'Live';
        if (currentProject) ws.send(JSON.stringify({ type:'subscribe', projectId: currentProject.id }));
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'task.updated' || msg.type === 'task.created') {
          tasks[msg.task.id] = msg.task;
          renderBoard({});
        } else if (msg.type === 'task.deleted') {
          delete tasks[msg.taskId];
          renderBoard({});
        }
      };
      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('on');
        document.getElementById('ws-label').textContent = 'Reconnecting...';
        setTimeout(connectWs, 3000);
      };
    }

    // Auto-login if token exists
    if (token) loadApp().catch(() => { token = null; localStorage.removeItem('tm_token'); });
  </script>
</body>
</html>
